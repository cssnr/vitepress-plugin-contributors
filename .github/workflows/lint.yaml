name: "Lint"

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !contains(github.event.head_commit.message, '#nolint') }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v5

      - name: "Setup Node"
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: "Install"
        id: install
        run: |
          npm ci

      #- name: "ESLint"
      #  if: ${{ !cancelled() }}
      #  run: |
      #    npm run lint

      - name: "Prettier Check"
        if: ${{ !cancelled() }}
        run: |
          npm run prettier:check

      - name: "Yamllint"
        if: ${{ !cancelled() }}
        env:
          CONFIG: .github/yamllint.yaml
        run: |
          echo "::group::List Files"
          yamllint -c "${{ env.CONFIG }}" --list-files .
          echo "::endgroup::"
          yamllint -c "${{ env.CONFIG }}" .

      - name: "actionlint"
        if: ${{ !cancelled() }}
        uses: cssnr/actionlint-action@v1

      # Lint: src/get-contributors.js
      - name: "Check Contributors Changes"
        id: contributors-changed
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: |
            src/get-contributors.js
            package*.json

      - name: "Verify Contributors Build"
        if: steps.contributors-changed.outputs.any_changed == 'true'
        run: |
          npm run build:contributors

      # Lint: docs/
      - name: "Check Docs Changes"
        id: docs-changed
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: |
            docs/**
            package*.json

      - name: "Verify Docs Build"
        if: steps.docs-changed.outputs.any_changed == 'true'
        run: |
          npm run docs:deploy
