name: "Release"

on:
  release:
    types: [published]

jobs:
  release:
    name: "Release"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      id-token: write

    environment:
      name: npm
      url: https://www.npmjs.com/package/@cssnr/vitepress-plugin-contributors

    steps:
      - name: "Checkout"
        uses: actions/checkout@v5

      - name: "Debug Event"
        continue-on-error: true
        run: |
          echo "ref: ${{ github.ref }}"
          echo "event_name: ${{ github.event_name }}"
          echo "github.event.repository.name: ${{ github.event.repository.name }}"

          echo "::group::cat event.json"
          cat "${GITHUB_EVENT_PATH}"
          echo "::endgroup::"

      - name: "Update Package Version"
        uses: cssnr/update-json-value-action@v1
        with:
          file: "package.json"

      - name: "Debug Package File"
        continue-on-error: true
        run: |
          cat package.json

      - name: "Setup Node"
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: "Install"
        run: |
          npm ci

      - name: "Publish"
        if: ${{ !github.event.release.prerelease }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --provenance --access public

      - name: "Build Contributors"
        continue-on-error: true
        run: |
          npm run build:contributors

      - name: "List Artifacts"
        continue-on-error: true
        working-directory: dist
        run: |
          results="$(tree .)"
          echo "::group::results"
          echo "${results}"
          echo "::endgroup::"
          md="Artifacts:\n\`\`\`text\n${results}\n\`\`\`"
          echo -e "${md}" >> "$GITHUB_STEP_SUMMARY"

      - name: "Upload to Actions"
        uses: actions/upload-artifact@v5
        continue-on-error: true
        with:
          name: dist
          path: dist

      - name: "Archive Distribution"
        continue-on-error: true
        run: |
          chmod +x dist/get-contributors/index.js
          zip -r dist.zip dist package.json README.md LICENSE

      - name: "Upload Release"
        id: release
        if: ${{ github.event_name == 'release' }}
        uses: cssnr/upload-release-action@v1
        continue-on-error: true
        with:
          files: |
            dist.zip
            dist/get-contributors/index.js
          names: |
            dist.zip
            get-contributors.js

      - name: "Parse Release"
        id: asset
        if: ${{ github.event_name == 'release' }}
        env:
          assets: ${{ steps.release.outputs.assets }}
        run: |
          echo "url: ${{ fromJSON(steps.release.outputs.assets)[1].browser_download_url }}"
          echo "url=${{ fromJSON(steps.release.outputs.assets)[1].browser_download_url }}" >> "$GITHUB_OUTPUT"
          echo "digest: ${{ fromJSON(steps.release.outputs.assets)[1].digest }}"
          sha256="$(echo "${{ fromJSON(steps.release.outputs.assets)[1].digest }}" | cut -d ":" -f 2)"
          echo "sha256: ${sha256}"
          if [ -z "${sha256}" ];then
            echo "Missing sha256"
            exit 1
          fi
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: "Homebrew Action"
        id: homebrew
        if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
        uses: cssnr/homebrew-action@master
        with:
          url: ${{ steps.asset.outputs.url }}
          sha256: ${{ steps.asset.outputs.sha256 }}
          repo: cssnr/homebrew-tap
          formula: get-contributors.rb
          message: Bump get-contributors.rb to ${{ github.ref_name }}
          branch: master
          app_id: 146360
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: "Update Release Notes Action"
        uses: smashedr/update-release-notes-action@master
        continue-on-error: true
        with:
          location: tail

      - name: "Package Changelog Action"
        continue-on-error: true
        uses: cssnr/package-changelog-action@v2

      - name: "Send Failure Notification"
        if: ${{ failure() }}
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          description: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
